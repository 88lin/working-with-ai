<svg xmlns="http://www.w3.org/2000/svg" width="560" height="240" viewBox="0 0 560 240">
  <rect width="560" height="240" rx="12" fill="#fff"/>
  <!-- Avatar placeholder -->
  <rect x="20" y="20" width="48" height="48" rx="8" fill="#d8d8e8"/>
  <text x="44" y="50" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#667">E0</text>
  <!-- Name -->
  <text x="80" y="38" font-family="system-ui,sans-serif" font-weight="600" font-size="16" fill="#576b95">E0</text>
  <!-- Content -->
  <text x="80" y="68" font-family="system-ui,sans-serif" font-size="17" fill="#222">
    <tspan>Last year's "tab all the way" turned out</tspan>
    <tspan x="80" dy="24">to be too conservative. So this year,</tspan>
    <tspan x="80" dy="24">may you not need to write a single</tspan>
    <tspan x="80" dy="24">line of code next year (well-meaning</tspan>
    <tspan x="80" dy="24">wishes)!</tspan>
  </text>
  <!-- Date -->
  <text x="80" y="200" font-family="system-ui,sans-serif" font-size="13" fill="#b0b0b0">Feb 17, 2026  00:06</text>
  <!-- Action dots -->
  <rect x="490" y="188" width="40" height="24" rx="4" fill="#f5f5f5"/>
  <circle cx="505" cy="200" r="3" fill="#607"/>
  <circle cx="517" cy="200" r="3" fill="#607"/>
</svg>
